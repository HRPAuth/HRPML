<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Shell Executor - HRPML</title>

</head>
<body>
    <div id="shell-app">
        <h1>Shell Command Executor</h1>

            <form id="shell-form">

            <div id="output-container">
                <h3>Output:</h3>
                <pre id="output"></pre>
            </div>
        </div>
        <div>
            <a href="/">Back to Home</a>
        </div>
    </div>
    <script src="/js/neutralino.js"></script>
    <script src="/js/shell.js"></script>
</body>
</html>
