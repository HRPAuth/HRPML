<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shell API</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 30px;
        }
        h1 {
            color: #333;
            text-align: center;
            margin-bottom: 30px;
            font-size: 28px;
        }
        .command-input {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        input[type="text"] {
            flex: 1;
            padding: 15px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
        }
        button {
            padding: 15px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        .result {
            border: 1px solid #e0e0e0;
            border-radius: 10px;
            overflow: hidden;
        }
        .result-header {
            display: flex;
            gap: 10px;
            border-bottom: 1px solid #e0e0e0;
        }
        .result-tab {
            padding: 12px 20px;
            background: #f5f5f5;
            cursor: pointer;
            font-weight: 500;
            color: #666;
            transition: all 0.3s;
        }
        .result-tab.active {
            background: #667eea;
            color: white;
        }
        .result-content {
            padding: 20px;
            min-height: 200px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        .success {
            color: #28a745;
        }
        .error {
            color: #dc3545;
        }
        .info-box {
            background: #e7f3ff;
            border-left: 4px solid #2196F3;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 0 10px 10px 0;
        }
        .info-box h3 {
            margin: 0 0 10px 0;
            color: #1976D2;
        }
        .info-box code {
            background: rgba(255, 255, 255, 0.8);
            padding: 2px 6px;
            border-radius: 4px;
        }
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .status-indicator {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #28a745;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(40, 167, 69, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(40, 167, 69, 0); }
            100% { box-shadow: 0 0 0 0 rgba(40, 167, 69, 0); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>
            <span class="status-indicator"></span>
            Shell API Server<a href="main.html">to main</a>
        </h1>
        
        <div class="info-box">
            <h3>About</h3>
            <p>This is a Shell API server running at <code>http://localhost:34501/api/shell</code>. Use the form below to execute shell commands.</p>
        </div>

        <div class="command-input">
            <input type="text" id="commandInput" placeholder="Enter shell command (e.g., ls -la, pwd, whoami)" value="ls -la">
            <button id="executeBtn">
                <span id="btnText">Execute</span>
                <span id="btnLoader" class="loading" style="display: none;"></span>
            </button>
        </div>

        <div class="result">
            <div class="result-header">
                <div class="result-tab active" data-tab="stdout">stdout</div>
                <div class="result-tab" data-tab="stderr">stderr</div>
                <div class="result-tab" data-tab="json">JSON Response</div>
            </div>
            <div class="result-content" id="resultContent"></div>
        </div>

        <div style="margin-top: 30px; padding-top: 20px; border-top: 1px solid #eee;">
            <h3>Quick Commands</h3>
            <div style="display: flex; flex-wrap: wrap; gap: 10px;">
                <button onclick="setCommand('ls -la')">List Files</button>
                <button onclick="setCommand('pwd')">Current Directory</button>
                <button onclick="setCommand('whoami')">Current User</button>
                <button onclick="setCommand('date')">Current Date</button>
                <button onclick="setCommand('echo &quot;Hello World&quot;')">Echo Test</button>
            </div>
        </div>
    </div>

    <script>
        const commandInput = document.getElementById('commandInput');
        const executeBtn = document.getElementById('executeBtn');
        const btnText = document.getElementById('btnText');
        const btnLoader = document.getElementById('btnLoader');
        const resultContent = document.getElementById('resultContent');
        const resultTabs = document.querySelectorAll('.result-tab');

        let currentResult = null;
        let activeTab = 'stdout';

        resultTabs.forEach(tab => {
            tab.addEventListener('click', () => {
                resultTabs.forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                activeTab = tab.dataset.tab;
                updateResultDisplay();
            });
        });

        function setCommand(cmd) {
            commandInput.value = cmd;
        }

        function updateResultDisplay() {
            if (!currentResult) {
                resultContent.innerHTML = '<span style="color: #999;">Execute a command to see results</span>';
                return;
            }

            switch (activeTab) {
                case 'stdout':
                    resultContent.innerHTML = currentResult.success 
                        ? `<span class="success">Success!</span>\n${currentResult.stdout || '(empty)'}`
                        : `<span class="error">Failed!</span>\n${currentResult.stdout || '(empty)'}`;
                    break;
                case 'stderr':
                    resultContent.textContent = currentResult.stderr || '(empty)';
                    break;
                case 'json':
                    resultContent.textContent = JSON.stringify(currentResult, null, 2);
                    break;
            }
        }

        async function executeCommand() {
            const command = commandInput.value.trim();
            if (!command) {
                alert('Please enter a command');
                return;
            }

            btnText.style.display = 'none';
            btnLoader.style.display = 'inline-block';
            executeBtn.disabled = true;

            try {
                const response = await fetch('/api/execute', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ command })
                });

                currentResult = await response.json();
                updateResultDisplay();
            } catch (error) {
                currentResult = {
                    success: false,
                    stdout: '',
                    stderr: '',
                    error: error.message
                };
                updateResultDisplay();
            } finally {
                btnText.style.display = 'inline-block';
                btnLoader.style.display = 'none';
                executeBtn.disabled = false;
            }
        }

        executeBtn.addEventListener('click', executeCommand);
        commandInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                executeCommand();
            }
        });

        updateResultDisplay();
    </script>
</body>
</html>
